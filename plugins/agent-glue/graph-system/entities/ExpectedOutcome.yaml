name: ExpectedOutcome
description: Optional assertion target for a fixture's terminal state. When present, replay asserts the run's terminal state against this entity; mismatch is a test failure.
stored_at: graphs/<name>/cohorts/<cohort_name>/expected/<fixture_id>.yaml
components:
  required:
    - FixtureRef
    - TerminalNode
  optional:
    - TerminalOutput
    - TerminalState
