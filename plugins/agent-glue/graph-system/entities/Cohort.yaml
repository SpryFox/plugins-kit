name: Cohort
description: |
  A collection of test fixtures for graph replay. The actual work recordings live in the
  work subsystem's recording store (`cohorts/<cohort_name>/recordings/<worker_type>/<request_hash>.yaml`);
  cohort-mode at submit() time points the work cache at this directory. The Cohort entity
  itself just enumerates which Fixtures exist for replay and which have ExpectedOutcomes.
stored_at: graphs/<name>/cohorts/<cohort_name>/cohort.yaml
components:
  required:
    - Name
    - CreatedAt
    - Fixtures
  optional:
    - Description
    - Expected            # list of fixture_ids that have expected-outcome assertions
