kind: Metadata
description: Worker-provided audit data for a WorkResult. Open-shaped because each worker type emits different keys (duration, tokens, model, exit code, etc.). The work subsystem treats this as opaque pass-through.
fields:
  worker_type:
    type: string
    required: true
  duration_ms:
    type: int
    required: false
  fields:
    type: map
    required: false
    value_type:
      type: any
    description: Worker-specific extra fields (tokens, cost, model, agent_type, etc.).
