kind: InvalidationCriteria
description: Conditions that must still hold for a cached WorkRecord to be considered fresh. Evaluated by the submit pipeline; failed predicates trigger a cache miss. Open-shaped because criteria types are extensible (file_mtime, env_var, etc.).
fields:
  predicates:
    type: list
    required: true
    items:
      type: map
      keys:
        kind:
          type: string
          required: true
          description: Criterion class (e.g. file_mtime, env_var, path_exists).
        spec:
          type: any
          required: true
