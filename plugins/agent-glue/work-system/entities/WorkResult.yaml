name: WorkResult
description: The worker's response to a WorkRequest. Exactly one of Output or Errored is present.
stored_at: return value from submit(); also serialized to cohort recordings and to WorkInvocation records
components:
  required:
    - Metadata
  optional:
    - Output          # present on success; mutually exclusive with Errored
    - SideEffects     # populated by workers that perform side effects (file writes, tool calls)
    - Errored         # present on failure; mutually exclusive with Output
