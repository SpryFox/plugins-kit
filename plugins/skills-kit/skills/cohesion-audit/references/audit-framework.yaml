# Audit framework -- canonical data model
#
# Primitives, compositions, and audit-kind registry. Authoritative on divergence
# with audit-framework.md. Scripts that need machine-readable structural facts
# (what is a skill, what files a plugin contains, which rules a given audit
# applies) load this YAML.
#
# Open under addition. To add a primitive, composition, or audit-kind, append
# a record here and implement the corresponding detection / rule code in the
# relevant scaffolding script. No framework-side refactor required.

_schema_version: "1"

# ---------------------------------------------------------------------------
# Primitives -- atomic, identifiable content kinds.
# ---------------------------------------------------------------------------

primitives:

  - id: md
    description: A Markdown file. The default form for prose, references, and orientation surfaces.
    detect_by: 'extension == ".md"'
    sub_kinds:
      - id: skill_md
        description: A SKILL.md -- the top-level contract of a skill.
        detect_by: 'filename == "SKILL.md"'
      - id: reference_doc
        description: A .md file inside a skill directory that is not SKILL.md.
        detect_by: 'inside a skill composition, filename != "SKILL.md"'
      - id: claude_md
        description: A CLAUDE.md -- orientation document for a directory's Audience-Claude.
        detect_by: 'filename == "CLAUDE.md"'
      - id: plain_md
        description: Any other .md file (project READMEs, design docs, hand-off plans).
        detect_by: 'extension == ".md" and not classified above'

  - id: yaml
    description: A YAML file, or a fenced YAML block embedded in markdown. Carries structured records for LLM-facing data.
    detect_by: 'extension in [".yaml", ".yml"] OR an embedded ```yaml fence inside a .md file'
    sub_kinds:
      - id: embedded
        description: A ```yaml ... ``` block inside a .md file. Used for contracts in SKILL.md, insight blocks in CLAUDE.md.
        detect_by: 'fenced block inside an md file'
      - id: standalone
        description: A .yaml/.yml file on its own. Used for pure data (this file, schemas).
        detect_by: 'extension only'

  - id: json
    description: A JSON file. Used for manifests and runtime state.
    detect_by: 'extension == ".json"'
    sub_kinds:
      - id: plugin_manifest
        description: A .claude-plugin/plugin.json -- the plugin's declared identity, version, and surface.
        detect_by: 'path matches **/.claude-plugin/plugin.json'
      - id: marketplace_manifest
        description: A .claude-plugin/marketplace.json -- lists available plugins.
        detect_by: 'path matches **/.claude-plugin/marketplace.json'
      - id: bootstrap_manifest
        description: A bootstrap.json -- plugin's dependency manifest read by the bootstrap engine.
        detect_by: 'filename == "bootstrap.json"'

  - id: script
    description: An executable file -- Python, Bash, PowerShell. Carries deterministic logic that replaces inference.
    detect_by: 'extension in [".py", ".sh", ".ps1", ".bat"]'
    sub_kinds:
      - id: facade
        description: A script invoked from a skill or slash command as a single repeatable step (audit.py, references_audit.py, classify.py).
        detect_by: 'referenced from a SKILL.md procedures step or from a slash command'
      - id: library
        description: A script imported by other scripts; not a CLI entry point. Typically prefixed with underscore (_shared.py, _corpus.py).
        detect_by: 'filename starts with underscore OR not referenced as a CLI entry'

# ---------------------------------------------------------------------------
# Compositions -- directory structures that aggregate primitives.
# ---------------------------------------------------------------------------

compositions:

  - id: directory
    description: A plain directory with no special marker. The fallback when no other composition matches.
    marker: 'any directory'
    contains:
      optional:
        - kind: "*"
    nests_inside: []
    nests: [directory, project, plugin, skill]
    discovery_priority: 99

  - id: skill
    description: A directory containing a SKILL.md plus optional references/ and scripts/.
    marker: 'SKILL.md at the directory root'
    contains:
      required:
        - kind: skill_md
          count: 1
          at: '<root>/SKILL.md'
      optional:
        - kind: dir
          name: references
          contains_primitives: [reference_doc]
        - kind: dir
          name: scripts
          contains_primitives: [script]
        - kind: claude_md
          at: '<root>/CLAUDE.md'
    nests_inside: [plugin, project, directory]
    nests: []
    discovery_priority: 30

  - id: plugin
    description: A directory containing a .claude-plugin/plugin.json -- the publish unit of the Claude Code plugin system.
    marker: '.claude-plugin/plugin.json at the directory root'
    contains:
      required:
        - kind: plugin_manifest
          at: '<root>/.claude-plugin/plugin.json'
      optional:
        - kind: dir
          name: skills
          contains_compositions: [skill]
        - kind: dir
          name: commands
        - kind: dir
          name: agents
        - kind: dir
          name: hooks
        - kind: bootstrap_manifest
          at: '<root>/bootstrap.json'
        - kind: claude_md
          at: '<root>/CLAUDE.md'
    nests_inside: [project, directory]
    nests: [skill]
    discovery_priority: 20

  - id: marketplace
    description: A repository that publishes one or more plugins via a marketplace.json. Itself a kind of project.
    marker: '.claude-plugin/marketplace.json at the directory root'
    contains:
      required:
        - kind: marketplace_manifest
          at: '<root>/.claude-plugin/marketplace.json'
      optional:
        - kind: dir
          name: plugins
          contains_compositions: [plugin]
        - kind: claude_md
          at: '<root>/CLAUDE.md'
    nests_inside: [project, directory]
    nests: [plugin]
    discovery_priority: 15

  - id: project
    description: A CWD-rooted working directory. The user's repository or workspace.
    marker: 'implicit (the scan root, when not a more specific composition)'
    contains:
      optional:
        - kind: claude_md
          at: '<root>/CLAUDE.md'
        - kind: dir
          name: .claude
        - kind: dir
          name: .claude/skills
          contains_compositions: [skill]
    nests_inside: [directory]
    nests: [marketplace, plugin, skill]
    discovery_priority: 10

  - id: claude_user_dir
    description: The user's ~/.claude/ directory. The home of installed marketplaces, user-level skills, settings, and per-project memory.
    marker: 'path == ~/.claude/ (one absolute root, not pattern-matched)'
    contains:
      optional:
        - kind: dir
          name: plugins/marketplaces
          contains_compositions: [marketplace]
        - kind: dir
          name: skills
          contains_compositions: [skill]
        - kind: dir
          name: plugins/cache
        - at: '<root>/settings.json'
        - at: '<root>/installed_plugins.json'
        - at: '<root>/known_marketplaces.json'
    nests_inside: []
    nests: [marketplace, skill]
    discovery_priority: 5

# ---------------------------------------------------------------------------
# Audit-kind registry -- the load-bearing surface for "what audits exist."
#
# Each entry binds primitives + compositions + rule-ids into a named audit.
# Rule ids reference the canonical definitions in the owning SKILL.md's
# audit_skill.criteria block (single source of truth per rule -- the framework
# only catalogs the binding, not the rule itself). Rules whose id appears in
# rules_per_composition but does NOT yet exist in the owning SKILL.md are
# planned future work; track them under future_rules below.
# ---------------------------------------------------------------------------

audit_kinds:

  - id: references_audit
    skill: skills-kit:references-audit
    subject_type: corpus
    discovery: in-script (the scanner walks the scan tree itself; future: shared with corpus discovery)
    evaluator_scaffolding: plugins/skills-kit/skills/references-audit/scripts/references_audit.py
    consumes_primitives: [md]
    traverses_compositions: [directory, skill, plugin, project]
    rules_owned_in: plugins/skills-kit/skills/references-audit/SKILL.md (audit_skill.criteria)
    rules_per_composition:
      directory: [hard_dep_missing, soft_ref_missing]
      skill: [hard_dep_missing, soft_ref_missing, name_mismatch]
      plugin: [hard_dep_missing, soft_ref_missing]
      project: [hard_dep_missing, soft_ref_missing, shadowing]
    taxonomy_doc: plugins/skills-kit/skills/references-audit/references/finding-taxonomy.md

  - id: skill_md_audit
    skill: skills-kit:skill-audit
    subject_type: corpus
    discovery: plugins/skills-kit/skills/skill-audit/scripts/discover.py (cwd-relative)
    corpus_discovery: plugins/skills-kit/scripts/_corpus.py (User + Project + Plugins; shared with roster/hierarchy procedures)
    evaluator_scaffolding: plugins/skills-kit/skills/skill-authoring/scripts/audit.py
    consumes_primitives: [skill_md, yaml]
    traverses_compositions: [skill]
    rules_owned_in: plugins/skills-kit/skills/skill-audit/SKILL.md (audit_skill.criteria)
    rules_per_composition:
      skill:
        - required_frontmatter
        - description_quality
        - yaml_contract_block
        - mixed_type_signal
        - ccp_placement
        - crp_placement
        - adp_back_reference
        - decision_provenance
        - hygiene_thresholds
    taxonomy_in_skill: 'plugins/skills-kit/skills/skill-audit/SKILL.md (audit_skill.taxonomy)'

# ---------------------------------------------------------------------------
# Future rules -- bindings declared in audit_kinds.*.rules_per_composition but
# not yet implemented (no entry in the owning SKILL.md criteria block).
# Adding the rule means: (1) author the criteria entry in the owning SKILL.md,
# (2) implement detection in the evaluator scaffolding, (3) remove from this
# list. No framework-side change required.
# ---------------------------------------------------------------------------

future_rules:
  - id: references_reachable_from_skill_md
    audit_kind: references_audit
    target_composition: skill
    intent: 'Every file under a skill''s references/ is reachable from SKILL.md (directly or transitively). Powers orphan-reference detection.'
  - id: manifest_declarations_resolve
    audit_kind: references_audit
    target_composition: plugin
    intent: Every skill/command/agent declared in plugin.json exists on disk. Powers manifest reverse-orphan detection.
  - id: no_cross_scope_personal_refs
    audit_kind: references_audit
    target_composition: plugin
    intent: A shipped plugin skill does not reference a personal/project-only skill.

# ---------------------------------------------------------------------------
# Viewer-kind registry -- viewers ride on the same substrate as audits but
# produce a representation (typically self-contained HTML) instead of findings.
# Each entry binds primitives + compositions + a generator script.
# ---------------------------------------------------------------------------

viewer_kinds:

  - id: plugin_ecosystem
    skill: awesome-kit:plugin-ecosystem
    subject: marketplace
    subject_type: corpus
    roots:
      - '~/.claude/plugins/marketplaces/'
    discovery_gate: 'marketplace participates only if it ships .claude-plugin/poster.yaml'
    generator_scaffolding: plugins/awesome-kit/skills/plugin-ecosystem/scripts/generate.py
    consumes_primitives: [marketplace_manifest, plugin_manifest, skill_md]
    traverses_compositions: [marketplace, plugin, skill]
    drill_depth: skill_name_only
    layered_overrides:
      - layer: operator
        path: '~/.claude/.local-data/awesome-kit/plugin-ecosystem-poster.yaml'
        owns: title / tagline / per-plugin state overrides
      - layer: marketplace
        path: '<marketplace>/.claude-plugin/poster.yaml'
        owns: subtitle / opt-in / per-plugin state declarations
      - layer: plugin
        path: '<plugin>/.claude-plugin/poster.yaml'
        owns: card description / razor / per-skill blurb overrides
    self_parameterizing: false

  - id: claude_explorer
    skill: prototypes:claude-explorer
    status: implemented (v1 -- deterministic projections only; LLM summaries reserved)
    subject: 'multi-root: claude_user_dir + project'
    subject_type: 'multi-root single-pass'
    roots:
      - '~/.claude/'
      - 'CWD (or --project PATH)'
    generator_scaffolding: plugins/prototypes/skills/claude-explorer/scripts/claude_explorer.py
    consumes_primitives: [skill_md, claude_md, reference_doc, plain_md, plugin_manifest, marketplace_manifest, bootstrap_manifest, script]
    traverses_compositions: [claude_user_dir, project, marketplace, plugin, skill, directory]
    drill_depth: unbounded
    layered_overrides:
      - layer: operator
        path: '~/.claude/.local-data/prototypes/claude-explorer.yaml'
        owns: title / tagline / included roots / default open-closed state
      - layer: marketplace
        path: '<marketplace>/.claude-plugin/claude-explorer.yaml'
        owns: marketplace card copy / per-plugin display overrides
      - layer: plugin
        path: '<plugin>/.claude-plugin/claude-explorer.yaml'
        owns: plugin card razor / per-skill display overrides
      - layer: skill
        path: '<skill>/claude-explorer.yaml'
        owns: per-reference / per-script blurb overrides
    self_parameterizing: true

# ---------------------------------------------------------------------------
# Future -- registry stubs for forward concerns. Not implemented today.
# Listed so adding them is a registry edit + scaffolding, not a framework refactor.
# ---------------------------------------------------------------------------

future:
  primitives:
    - id: code
      description: Source code in a language other than markdown / yaml / json / scripted (e.g. .ts, .go). Used when audits or viewers need to scan compiled-language code for references or contracts.
  audit_kinds:
    - id: claude_md_audit
      description: Audit a CLAUDE.md for scope clarity, audience-claude posture, and decision-provenance hygiene.
    - id: plugin_manifest_audit
      description: Audit a plugin.json against on-disk skills/commands/agents and against the marketplace.json version.
    - id: orphan_audit
      description: Detect skills, reference docs, and manifest entries with no inbound references inside their containing composition.
