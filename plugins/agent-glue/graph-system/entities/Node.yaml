name: Node
description: A unit of work in a graph. Every node encompasses a unit of work; how the work is performed (in-impl or delegated to the work subsystem) is the node's choice and is not declared at the entity level.
stored_at: graphs/<name>/nodes/<node_name>/node.yaml
components:
  required:
    - Name
    - Topology
    - Implementation
  optional:
    - Description
    - Rules     # presence = node consumes config-driven rules from a rules.yaml sidecar
    - Prompt    # presence = node renders a Jinja prompt template from a prompt.md sidecar
    - Outputs   # presence = node writes one or more canonical artifacts
    - ShowWork  # per-entity show-your-work override
