kind: SideEffects
description: Structured record of external effects a worker performed. Populated by side-effect-capable workers (claude_agent, python_script). Inference workers leave this absent. Each facet is an independently-optional list; a worker populates whichever facets apply.
fields:
  files_written:
    type: list
    required: false
    items:
      type: string
      description: Absolute or project-relative path of a written file.
  tools_used:
    type: list
    required: false
    items:
      type: map
      keys:
        tool_name:
          type: string
          required: true
        args:
          type: any
          required: false
  subprocess_invoked:
    type: list
    required: false
    items:
      type: map
      keys:
        cmd:
          type: list
          required: true
          items:
            type: string
        exit_code:
          type: int
          required: true
        stdout_summary:
          type: string
          required: false
