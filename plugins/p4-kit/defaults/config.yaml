# Perforce connection — auto-detected from `p4 set` or $P4PORT/$P4USER env vars
P4PORT: ""
P4USER: ""

# Default review agent. Built-in options:
#   claude-opus, claude-haiku       — use `claude -p` (no API key needed)
#   codex-*, gemini-*, deepseek-*,  — use OpenAI/OpenRouter (set keys below)
#   grok-*, kimi-*
DEFAULT_AGENT: "claude-opus"

# Optional — only needed to use non-Claude agents.
# Set to a real key (e.g. "sk-...") to enable, or leave empty to disable.
OPENAI_API_KEY: ""
OPENROUTER_API_KEY: ""
