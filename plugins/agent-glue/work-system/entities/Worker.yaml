name: Worker
description: A capability-bearing fulfillment backend. Workers register themselves in the work subsystem's registry at import time, declaring their components.
stored_at: registered programmatically in agent_glue_lib.work.workers at import time (no on-disk yaml for instances; this file is the type definition)
components:
  required:
    - WorkerType
    - Submitter
  optional:
    - ProvidedCapabilities    # absent = worker provides no tools or MCP servers
    - DefaultConfig           # absent = no defaults; request must supply full config
    - Determinism             # encodes the worker type's cacheability behavior. Values: `deterministic` (cacheable by default; CacheControl can override to non_deterministic), `requires_declaration` (no default; each WorkRequest must declare deterministic_idempotent or non_deterministic in its CacheControl, or submit() raises). Per worker type today: openrouter = deterministic (default; overridable -- non_deterministic implies non-zero temp under the hood); claude_inference = deterministic (same rules as openrouter); claude_agent = requires_declaration; python_script = requires_declaration. Force re-run without changing determinism uses `CacheControl.bypass: true`.
