<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>plugins-kit marketplace</title>
<style>
:root {
  --bg: #0f1419;
  --bg-2: #161c24;
  --bg-3: #1f2730;
  --line: #2a3340;
  --fg: #e6edf3;
  --fg-dim: #8b949e;
  --accent: #58a6ff;
  --accent-2: #79c0ff;
  --on: #3fb950;
  --on-bg: #14351e;
  --opt: #d29922;
  --opt-bg: #3a2c0a;
  --off: #6e7681;
  --off-bg: #21262d;
  --req: #d4a3ff;
  --req-bg: #3a1f4d;
}
* { box-sizing: border-box; }
html, body {
  margin: 0;
  padding: 0;
  background: var(--bg);
  color: var(--fg);
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Helvetica Neue", Arial, sans-serif;
  font-size: 14px;
  line-height: 1.4;
  overflow: hidden;
}
.poster {
  width: 100vw;
  height: 100vh;
  display: grid;
  grid-template-rows: auto 1fr;
  padding: 32px 48px 40px;
  gap: 24px;
  aspect-ratio: 16 / 9;
  max-width: calc(100vh * 16 / 9);
  max-height: calc(100vw * 9 / 16);
  margin: 0 auto;
}
header { text-align: center; }
header h1 {
  font-size: clamp(28px, 4vw, 56px);
  font-weight: 800;
  margin: 0 0 6px;
  letter-spacing: -0.02em;
  background: linear-gradient(90deg, var(--accent-2), #f0b4ff);
  -webkit-background-clip: text;
  background-clip: text;
  color: transparent;
}
header .sub {
  color: var(--fg-dim);
  font-size: clamp(11px, 1.2vw, 14px);
}
.columns {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 24px;
  min-height: 0;
}
.col {
  background: var(--bg-2);
  border: 1px solid var(--line);
  border-radius: 12px;
  display: flex;
  flex-direction: column;
  min-height: 0;
}
.col-header {
  padding: 14px 18px;
  border-bottom: 1px solid var(--line);
}
.col-header .name-row {
  display: flex;
  align-items: baseline;
  justify-content: space-between;
}
.col-header .name {
  font-weight: 700;
  font-size: clamp(14px, 1.4vw, 18px);
  letter-spacing: 0.02em;
  color: inherit;
  text-decoration: none;
}
.col-header a.name:hover {
  color: var(--accent);
  text-decoration: underline;
}
.col-header .count {
  color: var(--fg-dim);
  font-size: 12px;
}
.col-header .sub {
  color: var(--opt);
  font-size: 11px;
  margin-top: 4px;
  letter-spacing: 0.04em;
  text-transform: uppercase;
}
.col-body {
  padding: 14px;
  overflow-y: auto;
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  align-content: start;
}
.card {
  background: var(--bg-3);
  border: 1px solid var(--line);
  border-radius: 8px;
  padding: 10px 12px;
  cursor: pointer;
  transition: border-color 120ms, transform 120ms;
  display: flex;
  flex-direction: column;
  gap: 4px;
  text-align: left;
  color: inherit;
  font: inherit;
}
.card:hover {
  border-color: var(--accent);
  transform: translateY(-1px);
}
.card-head {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 8px;
}
.card-name {
  font-weight: 600;
  font-size: clamp(12px, 1.1vw, 15px);
}
.badge {
  font-size: 9px;
  font-weight: 700;
  letter-spacing: 0.08em;
  padding: 2px 6px;
  border-radius: 999px;
  text-transform: uppercase;
  white-space: nowrap;
}
.badge.on       { background: var(--on-bg);  color: var(--on); }
.badge.opt-in   { background: var(--opt-bg); color: var(--opt); }
.badge.off      { background: var(--off-bg); color: var(--off); }
.badge.unmanaged{ background: var(--off-bg); color: var(--fg-dim); }
.badge.required { background: var(--req-bg); color: var(--req); }
.card-desc {
  color: var(--fg-dim);
  font-size: clamp(10px, 0.95vw, 12px);
  display: -webkit-box;
  -webkit-line-clamp: 3;
  -webkit-box-orient: vertical;
  overflow: hidden;
}

/* side panel */
.scrim {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.5);
  opacity: 0;
  pointer-events: none;
  transition: opacity 200ms;
  z-index: 50;
}
.scrim.open { opacity: 1; pointer-events: auto; }
.panel {
  position: fixed;
  top: 0;
  right: 0;
  height: 100vh;
  width: min(560px, 42vw);
  background: var(--bg-2);
  border-left: 1px solid var(--line);
  transform: translateX(100%);
  transition: transform 220ms ease;
  z-index: 60;
  display: flex;
  flex-direction: column;
  box-shadow: -8px 0 24px rgba(0,0,0,0.4);
}
.panel.open { transform: translateX(0); }
.panel-head {
  padding: 20px 24px 12px;
  border-bottom: 1px solid var(--line);
}
.panel-head .crumb {
  color: var(--fg-dim);
  font-size: 11px;
  letter-spacing: 0.06em;
  text-transform: uppercase;
}
.panel-head h2 {
  margin: 4px 0 6px;
  font-size: 24px;
  font-weight: 700;
  display: flex;
  align-items: center;
  gap: 10px;
}
.panel-head .ver { color: var(--fg-dim); font-size: 12px; font-weight: 400; }
.panel-head .razor {
  color: var(--fg);
  font-size: 13px;
  margin-top: 8px;
  line-height: 1.5;
}
.panel-head .close {
  position: absolute;
  top: 12px;
  right: 12px;
  background: transparent;
  color: var(--fg-dim);
  border: 1px solid var(--line);
  border-radius: 6px;
  width: 28px;
  height: 28px;
  font: inherit;
  cursor: pointer;
}
.panel-head .close:hover { color: var(--fg); border-color: var(--accent); }
.panel-body {
  padding: 16px 24px 24px;
  overflow-y: auto;
}
.panel-section-title {
  font-size: 11px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--fg-dim);
  margin: 14px 0 8px;
}
.skill {
  padding: 10px 0;
  border-top: 1px solid var(--line);
}
.skill:first-child { border-top: none; }
.skill-name {
  font-size: 16px;
  font-weight: 600;
  color: var(--accent-2);
}
.skill-author {
  color: var(--fg-dim);
  font-size: 11px;
  font-weight: 400;
  margin-left: 6px;
}
.skill-desc {
  color: var(--fg);
  font-size: 12.5px;
  margin-top: 3px;
  line-height: 1.45;
}
.skill-empty {
  color: var(--fg-dim);
  font-style: italic;
  font-size: 12px;
}
footer {
  position: fixed;
  bottom: 8px;
  left: 0;
  right: 0;
  text-align: center;
  color: var(--fg-dim);
  font-size: 10px;
  pointer-events: none;
}
</style>
</head>
<body>
<div class="poster">
  <header>
    <h1>plugins-kit marketplace</h1>
    <div class="sub">Use /plugin to change your claude-code plugins, you decide what&#x27;s on!</div>
  </header>
  <div class="columns" id="cols" style="grid-template-columns: minmax(0, 720px); justify-content: center;"></div>
</div>
<div class="scrim" id="scrim"></div>
<aside class="panel" id="panel">
  <div class="panel-head" id="panelHead"></div>
  <div class="panel-body" id="panelBody"></div>
</aside>
<footer>generated by /plugin-ecosystem -- click a card for details.</footer>
<script>
const data = {"plugins": [{"marketplace": "plugins-kit", "name": "bootstrap", "version": "0.10.11", "description": "Dependancy for all plugins in this marketplace. Provides a centralized bootstrap engine for Claude Code plugins.", "razor": "", "state": "required", "skills": [{"name": "bootstrap", "description": "Use when interpreting SessionStart bootstrap messages or configuring user/project dependency manifests. Do NOT use for non-bootstrap debugging.", "type": "reference-skill", "author": "christina"}]}, {"marketplace": "plugins-kit", "name": "skills-kit", "version": "0.14.0", "description": "Skill authoring + shared audit framework. Vocabulary, type contracts, single-skill audit (/skill-audit), cross-reference audit/remediation (/references-audit), and the canonical audit-framework (primitives, compositions, audit-kinds, viewer-kinds) that other plugins' audits and viewers ride on.", "razor": "", "state": "on", "skills": [{"name": "claude-md-audit", "description": "Use when invoking /claude-md-audit to audit a CLAUDE.md against the cohesion framework; fans multi-file runs via the Workflow tool. Do NOT use for SKILL.md.", "type": "audit-skill", "author": "christina"}, {"name": "claude-md-audit-noworkflow", "description": "Use when invoking /claude-md-audit-noworkflow -- the preserved single-loop CLAUDE.md audit (no Workflow fan-out). Do NOT use for SKILL.md (use /skill-audit).", "type": "audit-skill", "author": "christina"}, {"name": "content-authoring", "description": "Use when authoring an LLM-facing document and deciding its content shape. Do NOT use for skill-specific contracts (use skill-authoring).", "type": "reference-skill", "author": "christina"}, {"name": "insight-engineering", "description": "Use when designing a tool that produces a materialized insight from deep scans or inference over project data. Do NOT use for one-shot print-and-exit scripts.", "type": "pattern-skill", "author": "christina"}, {"name": "knowledge-encoding", "description": "Use when encoding a discovered insight into a persistent location (CLAUDE.md, skill, reference doc). Do NOT use for end-of-session doc review.", "type": "", "author": "christina"}, {"name": "references-audit", "description": "Use when the user invokes /references-audit to scan markdown for broken skill cross-references. Do NOT use for single-skill validation (use /skill-audit).", "type": "audit-skill", "author": "christina"}, {"name": "skill-audit", "description": "Use when the user invokes /skill-audit to audit, inventory, or report on Claude Code skills. Do NOT use for CLAUDE.md (use /claude-md-audit).", "type": "audit-skill", "author": "christina"}, {"name": "skill-authoring", "description": "Use when authoring, auditing, or refining a Claude Code skill. Do NOT use for invoking existing skills or for general writing tasks.", "type": "domain-skill", "author": "christina"}]}, {"marketplace": "plugins-kit", "name": "awesome-kit", "version": "0.6.4", "description": "Christina's cross-domain skills: a shared communication framework (hand-off + verbose-updates), the update-documentation meta-skill, /plugin-ecosystem (interactive 16:9 HTML poster of marketplaces and plugins), and /html-pdf (convert an HTML file to PDF via headless Chromium and open it). Depends on plugins-kit:skills-kit for the shared audit framework and knowledge-encoding. /claude-explorer moved to plugins-kit:prototypes in 0.5.0.", "razor": "", "state": "on", "skills": [{"name": "hand-off", "description": "continue your work with a fresh agent in a context-efficient manner. Ideal for multi-phase projects.", "type": "technique-skill", "author": "christina"}, {"name": "html-pdf", "description": "Convert an HTML file to a PDF -- rendered by a real browser engine, so it looks right -- and pop it open.", "type": "technique-skill", "author": "christina"}, {"name": "knowledge-encoding", "description": "Encode conversation insights into persistent project locations", "type": "", "author": "christina"}, {"name": "plugin-ecosystem", "description": "Generates the html page you're reading right now!", "type": "", "author": "christina"}, {"name": "update-documentation", "description": "Use when ending a session to review work and recommend doc updates to CLAUDE.md, skills, and reference docs. Do NOT use for new skills or one-off notes.", "type": "", "author": "christina"}, {"name": "verbose-updates", "description": "Ideal when claude is doing a lot of work, and you aren't paying a lot of attention. Makes claude give thorough updates at end of turn.", "type": "technique-skill", "author": "christina"}]}, {"marketplace": "plugins-kit", "name": "prototypes", "version": "0.1.0", "description": "Experimental skills that may graduate into their own plugins. Currently hosts /claude-explorer (Omarchy-style HTML browser of ~/.claude/ + the current project, Python crawl + local HTTP serve + embedded SPA). Depends on plugins-kit:skills-kit for the shared audit framework.", "razor": "", "state": "on", "skills": [{"name": "claude-explorer", "description": "Use when generating or browsing the claude-explorer view -- an HTML view of ~/.claude/ + the current project. Do NOT use for audits or skill authoring.", "type": "technique-skill", "author": "christina"}]}, {"marketplace": "plugins-kit", "name": "unreal-kit", "version": "0.9.13", "description": "Unreal Engine automation: Python API for asset inspection and data extraction; MCP server for live Editor authoring (actors, Blueprints, materials, PIE)", "razor": "", "state": "on", "skills": [{"name": "fix-up-redirectors", "description": "Use when cleaning up Unreal ObjectRedirector assets in a P4-backed UE project. Do NOT use for non-P4 projects.", "type": "technique-skill", "author": "christina"}, {"name": "ue-mcp-server", "description": "Use when automating the Unreal Editor via the MCP server -- spawning actors, authoring graphs, driving PIE. Do NOT use for on-disk asset inspection.", "type": "capability-skill", "author": "christina"}, {"name": "ue-python-api", "description": "Use when reading, writing, or extracting Unreal Editor data via Python. Do NOT use for blueprint edits or non-Python Editor work.", "type": "capability-skill", "author": "christina"}]}, {"marketplace": "plugins-kit", "name": "p4-kit", "version": "0.11.2", "description": "Multi-agent code review of pending Perforce changelists via /p4-code-review (parallel Claude subagents). Shares chunking + CLAUDE.md primitives with git-kit via bootstrap_lib.code_review.", "razor": "", "state": "on", "skills": [{"name": "p4-code-review", "description": "Use when reviewing a pending Perforce changelist, or before asking the user to submit a CL. Do NOT use for git diffs or submitted CLs.", "type": "technique-skill", "author": "christina"}]}, {"marketplace": "plugins-kit", "name": "claude-ui-kit", "version": "0.4.1", "description": "Claude Code status line with context-window and rate-limit threshold colors, plus the /statusline skill to inspect and customize it.", "razor": "", "state": "on", "skills": [{"name": "statusline", "description": "Use when the user invokes /statusline or asks to inspect, customize, or reset their Claude Code status line. Do NOT use for unrelated UI customization.", "type": "technique-skill", "author": "christina"}]}, {"marketplace": "plugins-kit", "name": "git-kit", "version": "0.2.2", "description": "Git + GitHub multi-agent code review (/git-code-review) plus gh CLI bootstrap (auth + optional org membership). Shares chunking + CLAUDE.md primitives with p4-kit via bootstrap_lib.code_review.", "razor": "", "state": "on", "skills": [{"name": "git-code-review", "description": "Use when reviewing local git changes -- before push, before opening a PR, or auditing a branch. Do NOT use for Perforce CLs or existing PRs by URL.", "type": "technique-skill", "author": "christina"}]}, {"marketplace": "plugins-kit", "name": "openrouter-kit", "version": "0.1.3", "description": "OpenRouter API key management and account validation: shared library, CLI, and bootstrap-time credential check that other plugins/projects depend on for OpenRouter access", "razor": "", "state": "on", "skills": [{"name": "openrouter-account", "description": "Use when checking, setting, or rotating the OpenRouter API key, or diagnosing 401/402 errors. Do NOT use for general LLM/translation work.", "type": "technique-skill", "author": "christina"}]}], "marketplace_order": ["plugins-kit"], "marketplace_subtitles": {"plugins-kit": "Christina's open source plugin repository"}, "marketplace_urls": {"plugins-kit": "https://github.com/kitaekatt/plugins-kit"}};

function el(tag, attrs = {}, children = []) {
  const n = document.createElement(tag);
  for (const [k, v] of Object.entries(attrs)) {
    if (k === "class") n.className = v;
    else if (k === "text") n.textContent = v;
    else if (k.startsWith("on")) n.addEventListener(k.slice(2), v);
    else n.setAttribute(k, v);
  }
  for (const c of children) if (c) n.appendChild(c);
  return n;
}

function badge(state) {
  const label = { on: "On", "opt-in": "Opt-In", off: "Off", unmanaged: "Installed", required: "Required" }[state] || state;
  return el("span", { class: `badge ${state}`, text: label });
}

function renderColumn(marketplace, plugins) {
  const displayName = `${marketplace} marketplace`;
  const url = (data.marketplace_urls || {})[marketplace];
  const nameEl = url
    ? el("a", { class: "name", href: url, target: "_blank", rel: "noopener", text: displayName })
    : el("span", { class: "name", text: displayName });
  const nameRow = el("div", { class: "name-row" }, [
    nameEl,
    el("span", { class: "count", text: `${plugins.length} plugin${plugins.length === 1 ? "" : "s"}` }),
  ]);
  const headChildren = [nameRow];
  const sub = (data.marketplace_subtitles || {})[marketplace];
  if (sub) headChildren.push(el("div", { class: "sub", text: sub }));
  const head = el("div", { class: "col-header" }, headChildren);
  const body = el("div", { class: "col-body" });
  const rank = s => ({ required: 0, on: 1, "opt-in": 2, unmanaged: 3, off: 4 }[s] ?? 5);
  plugins
    .slice()
    .sort((a, b) => rank(a.state) - rank(b.state) || a.name.localeCompare(b.name))
    .forEach(p => body.appendChild(renderCard(p)));
  return el("div", { class: "col" }, [head, body]);
}

function renderCard(p) {
  return el("button", {
    class: "card",
    onclick: () => openPanel(p),
  }, [
    el("div", { class: "card-head" }, [
      el("span", { class: "card-name", text: p.name }),
      badge(p.state),
    ]),
    el("div", { class: "card-desc", text: p.description || "(no description)" }),
  ]);
}

function openPanel(p) {
  const panel = document.getElementById("panel");
  const body = document.getElementById("panelBody");
  const head = document.getElementById("panelHead");
  head.innerHTML = "";
  body.innerHTML = "";

  head.appendChild(el("div", { class: "crumb", text: p.marketplace }));
  head.appendChild(el("h2", {}, [
    document.createTextNode(p.name),
    el("span", { class: "ver", text: p.version ? `v${p.version}` : "" }),
    badge(p.state),
  ]));
  if (p.razor || p.description) {
    head.appendChild(el("div", { class: "razor", text: p.razor || p.description }));
  }
  const close = el("button", { class: "close", text: "x", onclick: closePanel, "aria-label": "Close" });
  head.appendChild(close);

  body.appendChild(el("div", { class: "panel-section-title", text: `Skills (${p.skills.length})` }));
  if (p.skills.length === 0) {
    body.appendChild(el("div", { class: "skill-empty", text: "This plugin ships no user-facing skills (commands or hooks only)." }));
  } else {
    p.skills.forEach(s => {
      const nameEl = el("div", { class: "skill-name" }, [document.createTextNode(s.name)]);
      if (s.author) nameEl.appendChild(el("span", { class: "skill-author", text: `by ${s.author}` }));
      const row = el("div", { class: "skill" }, [
        nameEl,
        el("div", { class: "skill-desc", text: s.description || "(no description)" }),
      ]);
      body.appendChild(row);
    });
  }

  panel.classList.add("open");
  document.getElementById("scrim").classList.add("open");
}

function closePanel() {
  document.getElementById("panel").classList.remove("open");
  document.getElementById("scrim").classList.remove("open");
}

function init() {
  const root = document.getElementById("cols");
  const groups = {};
  data.plugins.forEach(p => {
    (groups[p.marketplace] = groups[p.marketplace] || []).push(p);
  });
  const order = data.marketplace_order.filter(m => groups[m]);
  for (const m of Object.keys(groups)) if (!order.includes(m)) order.push(m);
  order.forEach(m => root.appendChild(renderColumn(m, groups[m])));

  document.getElementById("scrim").addEventListener("click", closePanel);
  document.addEventListener("keydown", e => { if (e.key === "Escape") closePanel(); });
}

window.addEventListener("DOMContentLoaded", init);
</script>
</body>
</html>
