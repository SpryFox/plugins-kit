kind: CacheControl
description: Per-request overrides for cache behavior and determinism. Absent = use the worker's default determinism and standard cache semantics.
fields:
  bypass:
    type: bool
    required: false
    description: True = ignore any existing cache record, invoke the worker, overwrite the record.
  determinism:
    type: enum
    required: false
    values: [deterministic, non_deterministic, deterministic_idempotent]
    description: Per-request determinism declaration. Workers with Determinism `requires_declaration` (claude_agent, python_script) require this. Inference workers accept `non_deterministic` to switch to non-zero temperature and skip cache.
  invalidate_if:
    type: map
    required: false
    value_type:
      type: any
    description: Additional preconditions that must hold for the cached record to be considered fresh (e.g. file mtime, env-var value). Failed predicates trigger a cache miss.
