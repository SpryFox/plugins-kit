name: Fixture
description: One starting state for replay -- the start-node input plus the PipelineState init values.
stored_at: graphs/<name>/cohorts/<cohort_name>/inputs/<fixture_id>.yaml
components:
  required:
    - FixtureId
    - StartInput       # the input to the start node
    - InitState        # the PipelineState init values
  optional:
    - SourceRunId      # if the fixture was promoted from a live run, the run_id string (no Run entity exists; runs are ephemeral)
