# UE Python Script Runner — global defaults
#
# Project-specific paths (engine_dir, uproject) go in:
#   <project_root>/.claude/unreal-kit.yaml  (per-project, preferred)
#   ~/.claude/plugins/data/plugins-kit/unreal-kit/config.yaml  (global, legacy fallback)
#
# Resolution order: CLI args → per-project config → global config → this file → hardcoded defaults

remote_execution:
  timeout_seconds: 5
  multicast_group: "239.0.0.1"
  multicast_port: 6766
