kind: CapabilityRequirement
description: Tools and MCP servers the worker must provide. Intersected against the worker's ProvidedCapabilities at submit time; missing entries raise CapabilityUnavailable. Meaningful only for workers that support tool/MCP use (claude_agent); inference and python_script workers raise if non-empty.
fields:
  tools:
    type: list
    required: false
    items:
      type: string
  mcp_servers:
    type: list
    required: false
    items:
      type: string
