kind: Errored
description: Failure state for an entity. Presence indicates the entity represents a failure outcome; mutually exclusive with success-shaped components on the same entity (e.g. Output on a WorkResult).
fields:
  error_type:
    type: string
    required: true
    description: Stable machine-readable error class (e.g. WorkerError, CapabilityUnavailable, OutputSchemaViolation).
  message:
    type: string
    required: true
  metadata:
    type: map
    value_type:
      type: any
    required: false
