name: WorkRequest
description: One unit of work to perform. The worker selection is required (no system-default fallback per the *Demand choices; default only to guide* principle in core/ARCHITECTURE.md); the request is otherwise worker-agnostic at the contract level.
stored_at: input parameter to submit(); also serialized at cohorts/<name>/requests/<request_sha>.yaml when recorded
components:
  required:
    - Input
    - OutputSchema
    - WorkerSelection         # required -- consumer must state the worker; no system default
  optional:
    - CapabilityRequirement   # absent = no required tools or MCP servers
    - CacheControl            # absent = default cache behavior (lookup by inputs_hash); set to force a re-run or specify invalidation criteria
