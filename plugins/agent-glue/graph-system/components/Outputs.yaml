kind: Outputs
description: Declares canonical artifacts the node writes after its output validates. Each entry is one OutputArtifactSpec.
fields:
  artifacts:
    type: list
    required: true
    items:
      type: map
      keys:
        path:
          type: string
          required: true
          description: Output file path; Jinja template with `{{ state.x }}` and `{{ input.x }}` substitutions.
        from:
          type: string
          required: true
          description: Dotted field path on the node's output contract whose value is the artifact content.
        format:
          type: enum
          required: true
          values: [yaml, json, text, managed]
          description: "`managed` means the node's execute writes the file itself; the runtime only verifies the path was written."
