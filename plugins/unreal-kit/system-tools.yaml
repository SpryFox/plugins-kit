system_tools:
  macos:
    - name: local-bin
      check_type: persistent_path
      check: "$HOME/.local/bin"
      install: "grep -qF '.local/bin' ~/.zshrc 2>/dev/null || echo 'export PATH=\"$HOME/.local/bin:$PATH\"' >> ~/.zshrc"
    - name: uv
      enabled: false
      check: "uv"
      install: "curl -LsSf https://astral.sh/uv/install.sh | sh"
    - name: git
      check: "git"
      install: "brew install git"

  windows:
    - name: local-bin
      check_type: persistent_path
      check: "$HOME/.local/bin"
      install: "powershell.exe -NoProfile -ExecutionPolicy Bypass -File ${PLUGIN_ROOT}/hooks/sessionstart/lib/add-to-win-path.ps1"
    - name: bintest
      enabled: false
      check_type: persistent_path
      check: "$HOME/.local/bintest"
      install: "powershell.exe -NoProfile -ExecutionPolicy Bypass -File ${PLUGIN_ROOT}/hooks/sessionstart/lib/add-to-win-path.ps1 .local/bintest"
    - name: uv
      enabled: false
      check: "uv"
      install: "curl -LsSf https://astral.sh/uv/install.sh | sh"
    - name: git
      check: "git"
      install: "winget install --id Git.Git -e --source winget"

  ubuntu:
    - name: local-bin
      check_type: persistent_path
      check: "$HOME/.local/bin"
      install: "grep -qF '.local/bin' ~/.bashrc 2>/dev/null || echo 'export PATH=\"$HOME/.local/bin:$PATH\"' >> ~/.bashrc"
    - name: curl
      check: "curl"
      install: "sudo apt install -y curl"
    - name: uv
      enabled: false
      check: "uv"
      install: "curl -LsSf https://astral.sh/uv/install.sh | sh"
    - name: git
      check: "git"
      install: "sudo apt install -y git"
