name: scan-files
description: Fan out a scan over a list of files, then summarize.

inputs:
  paths: list

schemas:
  finding:
    type: object
    properties:
      note: { type: string }

steps:
  - id: scan
    phase: scan
    for_each: "{{ inputs.paths }}"
    mode: parallel
    agent:
      prompt: "Scan {{ item }} and report anything notable."
      schema: finding
      agentType: Explore

  - id: summarize
    agent:
      prompt: |
        Summarize these per-file notes:
        {{ steps.scan[*].note }}
