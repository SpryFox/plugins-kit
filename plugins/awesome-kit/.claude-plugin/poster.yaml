# Plugin display overrides for the plugin-ecosystem skill
# (plugins-kit:awesome-kit /plugin-ecosystem).
#
# Lives alongside plugin.json. All fields optional. Where a field is
# absent, the source is read directly from plugin.json (plugin-level)
# or SKILL.md frontmatter (per-skill).
#
# Use this to author the poster copy a user sees without leaking
# display copy into a skill's activation `description:`.

skills:
  hand-off: "continue your work with a fresh agent in a context-efficient manner. Ideal for multi-phase projects."
  plugin-ecosystem: "Generates the html page you're reading right now!"
  verbose-updates: "Ideal when claude is doing a lot of work, and you aren't paying a lot of attention. Makes claude give thorough updates at end of turn."
