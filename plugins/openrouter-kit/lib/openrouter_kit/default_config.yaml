# OpenRouter model registry + selection defaults (shipped baseline).
#
# This is the lowest-precedence layer. Bootstrap seeds an editable copy at
#   ~/.claude/plugins/data/plugins-kit/openrouter-kit/config.yaml
# and a project may override at
#   <project_root>/.local-data/plugins-kit/openrouter-kit/config.yaml
# Higher layers are deep-merged over this one (project wins); new model
# entries union in, so an override file only states what it changes.
#
# Consumed by openrouter-kit and any plugin that makes OpenRouter calls
# (e.g. workflow-kit) via openrouter_kit.resolve_model().
#
# Keep in sync with DEFAULT_MODEL_CONFIG in models.py (a test enforces this).

models:
  qwen:
    slug: qwen/qwen3-32b
  gpt-mini:
    slug: openai/gpt-4o-mini
  gemini-lite:
    slug: google/gemini-2.5-flash-lite

# Named selection: `default` for general use, `defaultCheap` for cheap/smoke
# work. Each references a key under `models` (or may be a raw slug).
default: gpt-mini
defaultCheap: qwen
