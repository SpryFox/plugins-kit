# Declarative twin of node-strategies.example.js: the SAME shape (a script node and
# an openrouter node feed one Claude reasoning node, all via file-passing) authored
# as a .workflow.yaml that the compiler turns into a native Workflow script.
#
# Only `source` is a user input. The runId / pluginRoot / workflowKitVenvPython
# values the nodes use are reserved args the skill injects at run time -- see
# references/workflow-yaml.md "Reserved inputs".

name: node-strategies-demo
description: A script node (wordcount) and an openrouter node feed a Claude reasoning node, all via file-passing.

inputs:
  source: { type: string, description: "path to the input document" }

phases:
  - { id: prepare, title: Prepare }
  - { id: classify, title: Classify }
  - { id: reason, title: Reason }

steps:
  # script strategy: deterministic stats, no LLM in the loop. stdout -> $OUT.
  - id: stats
    phase: prepare
    script:
      command: '"{{ inputs.workflowKitVenvPython }}" "{{ inputs.pluginRoot }}/examples/scripts/wordcount.py" "{{ inputs.source }}"'
      label: wordcount

  # openrouter strategy: one non-Claude model call (model diversity). Reply -> $OUT.
  # model omitted + cheap:true -> openrouter-kit's configured 'defaultCheap' model.
  - id: classify
    phase: classify
    openrouter:
      prompt_file: "{{ inputs.source }}"
      cheap: true
      system: "In one word, classify the document type."
      label: classify

  # the ONLY node that reads the payloads -- token cost paid once, here.
  - id: reconcile
    phase: reason
    agent:
      prompt: |
        Read {{ steps.stats.path }} (wordcount stats JSON) and {{ steps.classify.path }}
        (external classifier verdict). In 3 bullets, reconcile them: report the stats,
        the classifier's one-word verdict, and whether it is plausible given the stats.
      label: reconcile

output: "{{ steps.reconcile }}"
