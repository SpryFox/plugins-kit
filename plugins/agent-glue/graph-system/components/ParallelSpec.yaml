kind: ParallelSpec
description: Marks an edge as fan-out parallel. Required when the source node's output for this variant is `list[Variant]` and the downstream node consumes single elements. Presence with parallel=false is identical to absence; the kit treats absence as sequential.
fields:
  parallel:
    type: bool
    required: true
  max_workers:
    type: int
    required: false
    description: Optional cap on concurrent downstream invocations. Absent = inherit from graph Config.
