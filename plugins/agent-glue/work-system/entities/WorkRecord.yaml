name: WorkRecord
description: One unit of completed work, recorded by the show-your-work system. Acts as both audit log and cache entry -- a subsequent submit() with a matching `inputs_hash` returns the record's `Result` without invoking the worker again. Same shape for live runs and cohort fixtures; only the directory differs.
stored_at: |
  live runs: <consumer_root>/.agent-glue-cache/<request_hash>.yaml
  cohort fixtures: cohorts/<cohort_name>/recordings/<worker_type>/<request_hash>.yaml
components:
  required:
    - RequestHash
    - InputsHash
    - Request
    - Result
    - WorkerRef
    - RecordedAt
  optional:
    - Attribution         # model, version, agent_type, etc. -- worker-specific metadata
    - SourceRunId         # ref to the run this record was produced in (run_id only, no entity); cross-cutting component
    - InvalidationCriteria # optional conditions that must hold for the cache entry to be valid
