type: Node
components:
  name:
    name: greet
  description:
    description: Greet the caller and emit a Disposition.
  topology:
    in: GreetIn
    out: GreetOut
  implementation:
    module: impl
    function: execute
  prompt:
    path: prompt.md
  outputs:
    artifacts:
      - path: "out/{{ input.caller }}/greeting.yaml"
        from: greeting
        format: yaml
