kind: WorkerSelection
description: Selects the worker type for this request and supplies worker-specific config. Absent on a WorkRequest = the system default worker is used. `config` is open-shaped because each worker type accepts different keys (LLM workers require `system_prompt`; python_script requires `function`; etc.). See work-system/DESIGN.md for per-worker config keys.
fields:
  type:
    type: string
    required: true
    description: Worker type name (e.g. openrouter, claude_inference, claude_agent, python_script). Resolved by the worker registry.
  config:
    type: map
    required: false
    value_type:
      type: any
