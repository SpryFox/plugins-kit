name: review-changes
description: Review a diff across several dimensions, then adversarially verify each finding.

inputs:
  diff: { type: string, description: "the unified diff to review" }

phases:
  - { id: review, title: Review }
  - { id: verify, title: Verify }

schemas:
  findings:
    type: object
    properties:
      findings:
        type: array
        items:
          type: object
          properties:
            title: { type: string }
            file: { type: string }
            detail: { type: string }
          required: [title, detail]
    required: [findings]
  verdict:
    type: object
    properties:
      isReal: { type: boolean }
      reason: { type: string }
    required: [isReal, reason]

steps:
  # One pipeline: each dimension is reviewed, and its findings are verified as soon
  # as that review completes -- dimension "bugs" verifies while "perf" still reviews.
  - id: dimensions
    pipeline:
      over: [bugs, perf, style]
      as: dim
      stages:
        - id: review
          phase: review
          agent:
            prompt: |
              Review the following diff for {{ dim }} issues. Report concrete,
              specific findings only.

              {{ inputs.diff }}
            schema: findings
        - id: verify
          phase: verify
          fan_out: { over: "{{ review.findings }}", as: finding, mode: parallel }
          agent:
            prompt: |
              Adversarially verify this candidate {{ dim }} finding. Default to
              isReal=false unless the evidence is clear.

              Title: {{ finding.title }}
              Detail: {{ finding.detail }}
            schema: verdict
            model: sonnet

output: "{{ steps.dimensions }}"
