kind: StateDecl
description: Declares the PipelineState shape for a graph. `init` fields are read-only after pipeline start; `accumulated` fields are mutated via StateDelta returned by nodes. Values are Pydantic-compatible type expressions as strings (e.g. "str", "list[AuditRecord]", "dict[str, int]"); the loader resolves named types against the graph's contracts module.
fields:
  init:
    type: map
    required: false
    value_type:
      type: string
  accumulated:
    type: map
    required: false
    value_type:
      type: string
